name: Sync Profile README

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'script.js'
      - 'professional/script.js'
      - 'professional/index.html'
      - 'lang.js'
      - 'scripts/*.js'
      - 'data/profile.json'
      - '.github/workflows/*.yml'
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  generate-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo (MCookinho.github.io)
        uses: actions/checkout@v4
        with:
          path: site

      - name: Checkout profile repo (MCookinho/MCookinho)
        uses: actions/checkout@v4
        with:
          repository: MCookinho/MCookinho
          token: ${{ secrets.PAT_README }}
          path: profile

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: AI Extract Profile from site data
        id: extract
        working-directory: site
        run: node scripts/ai-extract-profile.js
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AI_MODEL: mistral-ai/mistral-medium-2505
          PROFILE_FILE: ${{ github.workspace }}/site/data/profile.json

      - name: Commit AI profile update to site repo
        working-directory: site
        run: |
          git config user.name "MCookinho"
          git config user.email "ContatoPeuBorges@proton.me"
          git add data/profile.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update profile.json via AI extraction"
            git push
            echo "✅ profile.json updated by AI"
          else
            echo "ℹ️ No changes to profile.json"
          fi

      - name: AI Generate README with assets
        id: readme
        working-directory: site
        run: node scripts/ai-generate-readme.js
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AI_MODEL: mistral-ai/mistral-medium-2505
          SITE_DIR: ${{ github.workspace }}/site
          PROFILE_DIR: ${{ github.workspace }}/profile
          README_FILE: ${{ github.workspace }}/profile/README.md
          ASSETS_DIR: ${{ github.workspace }}/profile/assets
          HISTORY_DIR: ${{ github.workspace }}/profile/History

      - name: Ensure clear-history workflow in profile repo
        working-directory: profile
        run: |
          mkdir -p .github/workflows
          node -e "
            const fs = require('fs');
            const content = [
              'name: Clear History',
              'on: workflow_dispatch',
              'jobs:',
              '  clear:',
              '    runs-on: ubuntu-latest',
              '    steps:',
              '      - uses: actions/checkout@v4',
              '      - run: |',
              '          rm -rf History/',
              '          git config user.name \"MCookinho\"',
              '          git config user.email \"ContatoPeuBorges@proton.me\"',
              '          git add -A',
              '          git commit -m \"chore: clear history and reset ID counter\" || true',
              '          git push',
            ].join('\n');
            fs.writeFileSync('.github/workflows/clear-history.yml', content);
          "
          git add .github/workflows/clear-history.yml

      - name: Commit and push to profile repo
        working-directory: profile
        run: |
          git config user.name "MCookinho"
          git config user.email "ContatoPeuBorges@proton.me"
          git add README.md assets/ History/ .github/
          if git diff --cached --quiet; then
            echo "No changes — README is up to date"
          else
            git commit -m "chore: auto-sync profile README (AI generated)"
            git push
            echo "✅ README synced to MCookinho/MCookinho"
          fi
