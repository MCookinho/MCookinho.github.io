<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>// CASA DE CACHORRO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Press Start 2P', monospace; color: #ccc; }
    canvas { display: block; }

    ::selection { background: #600; color: #fff; }

    #gameUI {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }

    #crosshair {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 22px; color: rgba(200,50,50,0.25);
      pointer-events: none;
      text-shadow: 0 0 6px rgba(200,0,0,0.3);
    }

    /* === SCARY HUD === */
    #hud {
      position: absolute; inset: 0;
      pointer-events: none;
    }

    /* CRT scanline overlay */
    #hud::after {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      z-index: 11; pointer-events: none;
    }

    /* Vignette */
    #hudVignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
      z-index: 8; pointer-events: none;
    }

    /* Top-left: Day counter - large glitch text */
    #hudDayWrap {
      position: absolute; top: 30px; left: 30px;
    }
    #hudDay {
      font-size: 20px; color: #8a0303;
      text-shadow: 0 0 15px rgba(138,3,3,0.6), 0 0 30px rgba(138,3,3,0.2);
      letter-spacing: 6px;
      position: relative;
    }
    #hudDay::before {
      content: attr(data-text);
      position: absolute; top: 0; left: 0;
      color: rgba(200,50,50,0.15);
      clip-path: polygon(0 0, 100% 0, 100% 30%, 0 30%);
      transform: translate(-2px, -1px);
    }
    #hudDaySub {
      font-size: 7px; color: #5a3a3a;
      margin-top: 8px; letter-spacing: 3px;
    }

    /* Top-center: Memories */
    #hudMemWrap {
      position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
      text-align: center;
    }
    #hudMemLabel {
      font-size: 6px; color: #5a3a3a; letter-spacing: 2px;
      margin-bottom: 6px;
    }
    #hudMemories {
      font-size: 14px; color: #a87850;
      text-shadow: 0 0 10px rgba(168,120,80,0.4);
    }
    .mem-slot {
      display: inline-block; width: 18px; height: 18px;
      border: 1px solid #3a2a1a; margin: 0 3px;
      position: relative; vertical-align: middle;
    }
    .mem-slot.filled {
      background: #a87850;
      box-shadow: 0 0 8px rgba(168,120,80,0.4);
      border-color: #a87850;
    }

    /* Top-right: Hunger */
    #hudHungerWrap {
      position: absolute; top: 30px; right: 30px;
      text-align: right;
    }
    #hudHungerLabel {
      font-size: 6px; color: #5a3a3a; letter-spacing: 2px;
      margin-bottom: 6px;
    }
    #hudHungerBar {
      width: 120px; height: 10px;
      border: 1px solid #3a1a1a;
      background: #0a0505;
      position: relative; overflow: hidden;
    }
    #hudHungerFill {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, #5a0000, #8a1515);
      transition: width 0.3s;
      box-shadow: 0 0 10px rgba(138,21,21,0.3);
    }
    #hudHungerPct {
      font-size: 7px; color: #8a3a3a; margin-top: 4px;
    }

    /* Bottom: Item slots */
    #hudItemsWrap {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px;
      background: rgba(5,0,0,0.7);
      border: 1px solid #2a0a0a;
      padding: 10px 16px;
    }
    #hudItemsWrap::before {
      content: '// INVENTARIO';
      position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
      font-size: 6px; color: #3a1a1a; letter-spacing: 2px;
      white-space: nowrap;
    }
    .item-slot {
      width: 42px; height: 42px;
      border: 1px solid #2a0a0a;
      background: rgba(10,0,0,0.5);
      position: relative;
      overflow: hidden;
    }
    .item-slot.filled {
      border-color: #5a1a1a;
      box-shadow: 0 0 6px rgba(90,10,10,0.2);
    }
    .item-slot .item-icon {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: #a85a3a;
    }
    .item-slot .item-idx {
      position: absolute; bottom: 2px; right: 4px;
      font-size: 5px; color: #3a1a1a;
    }
    .item-slot.current {
      border-color: #8a2020;
      box-shadow: 0 0 12px rgba(138,32,32,0.3);
    }

    /* Interact prompt */
    #interactPrompt {
      position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%);
      font-size: 7px; color: #8a5030;
      background: rgba(5,0,0,0.7); border: 1px solid #3a1a0a;
      padding: 8px 16px;
      display: none;
      pointer-events: none;
      text-align: center; line-height: 1.8;
      text-shadow: 0 0 8px rgba(138,80,48,0.2);
    }

    /* Flashlight indicator */
    #flashlightIndicator {
      position: absolute; bottom: 110px; right: 30px;
      font-size: 6px; color: #3a3a1a;
      transition: color 0.15s;
    }
    #flashlightIndicator.on {
      color: #8a8a3a;
      text-shadow: 0 0 10px rgba(200,200,50,0.2);
    }

    /* === DEATH / WIN SCREENS === */
    #deathScreen {
      position: fixed; inset: 0; z-index: 100;
      background: radial-gradient(ellipse at center, #0a0000, #000);
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 30px;
    }
    #deathScreen.open { display: flex; }
    #deathScreen h2 {
      font-size: 14px; color: #8a0303;
      text-shadow: 0 0 30px rgba(138,3,3,0.6);
      letter-spacing: 6px;
    }
    #deathScreen p {
      font-size: 8px; color: #5a3a3a;
      max-width: 400px; text-align: center; line-height: 2;
    }
    #deathScreen .btn-retry {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px; padding: 12px 24px;
      background: none; border: 2px solid #8a0303;
      color: #8a0303; cursor: pointer;
      transition: all 0.15s;
      pointer-events: all;
      letter-spacing: 2px;
    }
    #deathScreen .btn-retry:hover {
      background: #8a0303; color: #000;
    }

    #winScreen {
      position: fixed; inset: 0; z-index: 100;
      background: radial-gradient(ellipse at center, #050008, #000);
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 20px;
    }
    #winScreen.open { display: flex; }

    #loadingScreen {
      position: fixed; inset: 0; z-index: 200;
      background: #050005;
      display: flex;
      flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
    }
    #loadingScreen.hidden {
      opacity: 0; pointer-events: none;
      transition: opacity 0.8s;
    }
    #loadingScreen h1 {
      font-size: 10px; color: #5a0000;
      letter-spacing: 4px;
    }
    #loadingScreen p {
      font-size: 6px; color: #3a1a1a;
    }
    #loadBarWrap {
      width: 200px; height: 4px;
      border: 1px solid #2a0a0a; background: #050000;
    }
    #loadBar {
      height: 100%; width: 0%;
      background: #5a0000;
      transition: width 0.3s;
      box-shadow: 0 0 8px rgba(90,0,0,0.3);
    }

    .glitch {
      animation: glitch 3s infinite;
    }
    @keyframes glitch {
      0%, 90%, 100% { transform: translate(0); opacity: 1; }
      92% { transform: translate(-3px, 1px); opacity: 0.8; }
      94% { transform: translate(3px, -1px); opacity: 0.9; }
      96% { transform: translate(-1px, 2px); opacity: 0.85; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div id="loadingScreen">
    <h1>// CASA DE CACHORRO</h1>
    <div id="loadBarWrap"><div id="loadBar"></div></div>
    <p>CARREGANDO...</p>
  </div>

  <div id="gameUI">
    <div id="hudVignette"></div>
    <div id="crosshair">+</div>

    <div id="hud">
      <div id="hudDayWrap">
        <div id="hudDay" data-text="DIA 1" class="glitch">DIA 1</div>
        <div id="hudDaySub">// 5 DIAS RESTAM</div>
      </div>

      <div id="hudMemWrap">
        <div id="hudMemLabel">// MEMORIAS</div>
        <div id="hudMemories">
          <span class="mem-slot" data-i="0"></span>
          <span class="mem-slot" data-i="1"></span>
          <span class="mem-slot" data-i="2"></span>
          <span class="mem-slot" data-i="3"></span>
          <span class="mem-slot" data-i="4"></span>
        </div>
      </div>

      <div id="hudHungerWrap">
        <div id="hudHungerLabel">// FOME</div>
        <div id="hudHungerBar"><div id="hudHungerFill"></div></div>
        <div id="hudHungerPct">100%</div>
      </div>

      <div id="hudItemsWrap">
        <div class="item-slot" data-i="0"><span class="item-idx">1</span></div>
        <div class="item-slot" data-i="1"><span class="item-idx">2</span></div>
        <div class="item-slot" data-i="2"><span class="item-idx">3</span></div>
        <div class="item-slot" data-i="3"><span class="item-idx">4</span></div>
        <div class="item-slot" data-i="4"><span class="item-idx">5</span></div>
        <div class="item-slot" data-i="5"><span class="item-idx">6</span></div>
      </div>
    </div>

    <div id="interactPrompt"></div>
    <div id="flashlightIndicator">🔦 LANTERNA: LIGADA</div>
  </div>

  <div id="deathScreen">
    <h2>SHIVA TE PEGOU!</h2>
    <p id="deathText">VOCÊ PERDEU TODOS OS ITENS DO DIA.<br/>TENTE NOVAMENTE...</p>
    <button class="btn-retry" id="retryBtn">TENTAR NOVAMENTE</button>
  </div>

  <div id="winScreen">
    <h2 id="winTitle" style="font-size:12px;color:#0fc;"></h2>
    <p id="winText" style="font-size:7px;color:#888;max-width:400px;text-align:center;line-height:2;"></p>
    <button class="btn-retry" id="winBtn" style="border-color:#0fc;color:#0fc;">VOLTAR</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="doghouse.js"></script>
</body>
</html>
