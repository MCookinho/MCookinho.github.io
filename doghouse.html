<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>// CASA DE CACHORRO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { overflow:hidden; background:#000; font-family:'Press Start 2P',monospace; color:#ccc; }
    canvas { display:block; }
    ::selection { background:#600; color:#fff; }

    #gameUI { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
    #crosshair {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      font-size:22px; color:rgba(200,50,50,0.25); pointer-events:none;
      text-shadow:0 0 6px rgba(200,0,0,0.3);
    }

    /* === HUD === */
    #hud { position:absolute; inset:0; pointer-events:none; }
    #hud::after {
      content:''; position:fixed; inset:0;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
      z-index:11; pointer-events:none;
    }
    #hudVignette { position:fixed; inset:0; background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.7) 100%); z-index:8; pointer-events:none; }

    #hudDayWrap { position:absolute; top:30px; left:30px; }
    #hudDay { font-size:20px; color:#8a0303; text-shadow:0 0 15px rgba(138,3,3,0.6),0 0 30px rgba(138,3,3,0.2); letter-spacing:6px; position:relative; }
    #hudDay::before { content:attr(data-text); position:absolute; top:0; left:0; color:rgba(200,50,50,0.15); clip-path:polygon(0 0,100% 0,100% 30%,0 30%); transform:translate(-2px,-1px); }
    #hudDaySub { font-size:7px; color:#5a3a3a; margin-top:8px; letter-spacing:3px; }

    #hudMemWrap { position:absolute; top:30px; left:50%; transform:translateX(-50%); text-align:center; }
    #hudMemLabel { font-size:6px; color:#5a3a3a; letter-spacing:2px; margin-bottom:6px; }
    #hudMemories { font-size:14px; color:#a87850; text-shadow:0 0 10px rgba(168,120,80,0.4); }
    .mem-slot { display:inline-block; width:18px; height:18px; border:1px solid #3a2a1a; margin:0 3px; vertical-align:middle; }
    .mem-slot.filled { background:#a87850; box-shadow:0 0 8px rgba(168,120,80,0.4); border-color:#a87850; }

    #hudHungerWrap { position:absolute; top:30px; right:30px; text-align:right; }
    #hudHungerLabel { font-size:6px; color:#5a3a3a; letter-spacing:2px; margin-bottom:6px; }
    #hudHungerBar { width:120px; height:10px; border:1px solid #3a1a1a; background:#0a0505; overflow:hidden; }
    #hudHungerFill { height:100%; width:100%; background:linear-gradient(90deg,#5a0000,#8a1515); transition:width 0.3s; box-shadow:0 0 10px rgba(138,21,21,0.3); }
    #hudHungerPct { font-size:7px; color:#8a3a3a; margin-top:4px; }

    #hudItemsWrap { position:absolute; bottom:40px; left:50%; transform:translateX(-50%); display:flex; gap:8px; background:rgba(5,0,0,0.7); border:1px solid #2a0a0a; padding:10px 16px; }
    #hudItemsWrap::before { content:'// INVENTARIO'; position:absolute; top:-22px; left:50%; transform:translateX(-50%); font-size:6px; color:#3a1a1a; letter-spacing:2px; white-space:nowrap; }
    .item-slot { width:42px; height:42px; border:1px solid #2a0a0a; background:rgba(10,0,0,0.5); overflow:hidden; }
    .item-slot.filled { border-color:#5a1a1a; box-shadow:0 0 6px rgba(90,10,10,0.2); }
    .item-slot .item-icon { display:flex; align-items:center; justify-content:center; width:100%; height:100%; font-size:18px; color:#a85a3a; }
    .item-slot .item-idx { position:absolute; bottom:2px; right:4px; font-size:5px; color:#3a1a1a; }

    /* Interact prompt */
    #interactPrompt { position:absolute; bottom:110px; left:50%; transform:translateX(-50%); font-size:7px; color:#8a5030; background:rgba(5,0,0,0.7); border:1px solid #3a1a0a; padding:8px 16px; display:none; pointer-events:none; text-align:center; line-height:1.8; text-shadow:0 0 8px rgba(138,80,48,0.2); }

    /* Flashlight */
    #flashlightIndicator { position:absolute; bottom:110px; right:30px; font-size:6px; color:#3a3a1a; transition:color 0.15s; }
    #flashlightIndicator.on { color:#8a8a3a; text-shadow:0 0 10px rgba(200,200,50,0.2); }

    /* Proximity alert */
    #shivaAlert { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:9px; color:#8a0303; opacity:0; transition:opacity 0.3s; text-shadow:0 0 20px rgba(138,3,3,0.5); }
    #shivaAlert.active { opacity:1; animation:shivaPulse 0.5s ease-in-out infinite alternate; }
    @keyframes shivaPulse { 0%{opacity:0.6} 100%{opacity:1} }

    /* === NOTE OVERLAY === */
    #noteOverlay {
      position:fixed; inset:0; z-index:50;
      background:rgba(0,0,0,0.88);
      display:none; align-items:center; justify-content:center;
      pointer-events:all;
    }
    #noteOverlay.open { display:flex; }
    #noteBox {
      width:480px; max-width:90vw; max-height:85vh;
      background:#120e0a; border:1px solid #3a2a1a;
      padding:30px; position:relative;
      box-shadow:0 0 40px rgba(0,0,0,0.5);
    }
    #noteBox::before {
      content:''; position:absolute; inset:10px;
      border:1px solid rgba(58,42,26,0.2);
      pointer-events:none;
    }
    #noteVictim { font-size:7px; color:#5a3a2a; letter-spacing:2px; margin-bottom:6px; }
    #noteTitle { font-size:9px; color:#a87850; letter-spacing:3px; margin-bottom:20px; }
    #noteText {
      font-size:7px; color:#8a7a5a; line-height:2.2;
      max-height:50vh; overflow-y:auto; text-align:justify;
      padding-right:8px;
    }
    #noteText::-webkit-scrollbar { width:2px; }
    #noteText::-webkit-scrollbar-track { background:#0a0806; }
    #noteText::-webkit-scrollbar-thumb { background:#3a2a1a; }
    #noteClose {
      margin-top:20px; text-align:center; font-size:7px; color:#5a3a2a;
      cursor:pointer; letter-spacing:2px; transition:color 0.15s;
    }
    #noteClose:hover { color:#a87850; }

    /* === PUZZLE OVERLAY === */
    #puzzleOverlay {
      position:fixed; inset:0; z-index:50;
      background:rgba(0,0,0,0.85);
      display:none; align-items:center; justify-content:center;
      pointer-events:all;
    }
    #puzzleOverlay.open { display:flex; }
    #puzzleBox {
      background:#0a0808; border:1px solid #2a1a1a;
      padding:30px; text-align:center;
      box-shadow:0 0 30px rgba(50,0,0,0.3);
    }
    #puzzleTitle { font-size:8px; color:#8a3a3a; letter-spacing:3px; margin-bottom:20px; }
    #puzzleDisplay {
      font-size:24px; color:#a85a3a; letter-spacing:12px;
      margin-bottom:20px; min-height:40px;
      background:#050303; border:1px solid #2a1a1a;
      padding:10px 20px; display:flex; align-items:center; justify-content:center;
    }
    #puzzleKeys {
      display:grid; grid-template-columns:repeat(5,1fr); gap:8px;
      max-width:300px; margin:0 auto 20px;
    }
    .pkey {
      font-family:'Press Start 2P',monospace; font-size:7px;
      padding:10px; background:#120a0a; border:1px solid #2a1a1a;
      color:#8a5a3a; cursor:pointer; transition:all 0.1s;
      pointer-events:all;
    }
    .pkey:hover { background:#1a0e0e; border-color:#5a2a2a; color:#a86a4a; }
    .pkey:active { background:#2a1010; }
    #puzzleMsg { font-size:6px; color:#5a3a3a; min-height:20px; margin-bottom:10px; }
    #puzzleClose { font-size:6px; color:#3a1a1a; cursor:pointer; pointer-events:all; }
    #puzzleClose:hover { color:#8a3a3a; }

    /* === ENDING SCREENS === */
    #endingScreen {
      position:fixed; inset:0; z-index:100;
      display:none;
      flex-direction:column; align-items:center; justify-content:center;
    }
    #endingScreen.open { display:flex; }
    #endingBad { background:radial-gradient(ellipse at center,#0a0000,#000); }
    #endingNeutral { background:radial-gradient(ellipse at center,#050008,#000); }
    #endingGood { background:radial-gradient(ellipse at center,#0a0500,#000); }
    #endingScreen h2 { font-size:12px; letter-spacing:4px; margin-bottom:20px; }
    #endingScreen p { font-size:7px; max-width:400px; text-align:center; line-height:2.2; margin-bottom:30px; }
    #endingBad h2 { color:#8a0303; text-shadow:0 0 30px rgba(138,3,3,0.6); }
    #endingBad p { color:#5a3a3a; }
    #endingNeutral h2 { color:#6a3a6a; text-shadow:0 0 20px rgba(100,50,100,0.4); }
    #endingNeutral p { color:#4a3a4a; }
    #endingGood h2 { color:#8a7a3a; text-shadow:0 0 30px rgba(200,180,80,0.3); }
    #endingGood p { color:#6a5a3a; }
    .ending-btn {
      font-family:'Press Start 2P',monospace; font-size:8px;
      padding:12px 24px; background:none; cursor:pointer;
      transition:all 0.15s; letter-spacing:2px; pointer-events:all;
    }
    #endingBad .ending-btn { border:2px solid #8a0303; color:#8a0303; }
    #endingBad .ending-btn:hover { background:#8a0303; color:#000; }
    #endingNeutral .ending-btn { border:2px solid #6a3a6a; color:#6a3a6a; }
    #endingNeutral .ending-btn:hover { background:#6a3a6a; color:#000; }
    #endingGood .ending-btn { border:2px solid #8a7a3a; color:#8a7a3a; }
    #endingGood .ending-btn:hover { background:#8a7a3a; color:#000; }

    /* Memory flash */
    #memoryFlash {
      position:fixed; inset:0; z-index:30;
      background:rgba(200,180,120,0.4);
      opacity:0; pointer-events:none;
      transition:opacity 0.15s;
    }
    #memoryFlash.active { opacity:1; }

    /* Loading */
    #loadingScreen {
      position:fixed; inset:0; z-index:200; background:#050005;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
    }
    #loadingScreen.hidden { opacity:0; pointer-events:none; transition:opacity 0.8s; }
    #loadingScreen h1 { font-size:10px; color:#5a0000; letter-spacing:4px; }
    #loadingScreen p { font-size:6px; color:#3a1a1a; }
    #loadBarWrap { width:200px; height:4px; border:1px solid #2a0a0a; background:#050000; }
    #loadBar { height:100%; width:0%; background:#5a0000; transition:width 0.3s; box-shadow:0 0 8px rgba(90,0,0,0.3); }

    .glitch { animation:glitch 3s infinite; }
    @keyframes glitch { 0%,90%,100%{transform:translate(0);opacity:1} 92%{transform:translate(-3px,1px);opacity:0.8} 94%{transform:translate(3px,-1px);opacity:0.9} 96%{transform:translate(-1px,2px);opacity:0.85} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>
  <div id="loadingScreen">
    <h1>// CASA DE CACHORRO</h1>
    <div id="loadBarWrap"><div id="loadBar"></div></div>
    <p>CARREGANDO...</p>
  </div>

  <div id="gameUI">
    <div id="hudVignette"></div>
    <div id="crosshair">+</div>
    <div id="shivaAlert">⚠ SHIVA PROXIMA</div>

    <div id="hud">
      <div id="hudDayWrap">
        <div id="hudDay" data-text="DIA 1" class="glitch">DIA 1</div>
        <div id="hudDaySub">// 5 DIAS RESTAM</div>
      </div>
      <div id="hudMemWrap">
        <div id="hudMemLabel">// MEMORIAS</div>
        <div id="hudMemories">
          <span class="mem-slot" data-i="0"></span>
          <span class="mem-slot" data-i="1"></span>
          <span class="mem-slot" data-i="2"></span>
          <span class="mem-slot" data-i="3"></span>
          <span class="mem-slot" data-i="4"></span>
        </div>
      </div>
      <div id="hudHungerWrap">
        <div id="hudHungerLabel">// FOME</div>
        <div id="hudHungerBar"><div id="hudHungerFill"></div></div>
        <div id="hudHungerPct">100%</div>
      </div>
      <div id="hudItemsWrap">
        <div class="item-slot" data-i="0"><span class="item-idx">1</span></div>
        <div class="item-slot" data-i="1"><span class="item-idx">2</span></div>
        <div class="item-slot" data-i="2"><span class="item-idx">3</span></div>
        <div class="item-slot" data-i="3"><span class="item-idx">4</span></div>
        <div class="item-slot" data-i="4"><span class="item-idx">5</span></div>
        <div class="item-slot" data-i="5"><span class="item-idx">6</span></div>
      </div>
    </div>

    <div id="interactPrompt"></div>
    <div id="flashlightIndicator">🔦 LANTERNA</div>
  </div>

  <div id="memoryFlash"></div>

  <!-- NOTE OVERLAY -->
  <div id="noteOverlay">
    <div id="noteBox">
      <div id="noteVictim"></div>
      <div id="noteTitle"></div>
      <div id="noteText"></div>
      <div id="noteClose">[ FECHAR ]</div>
    </div>
  </div>

  <!-- PUZZLE OVERLAY -->
  <div id="puzzleOverlay">
    <div id="puzzleBox">
      <div id="puzzleTitle">// CADEADO</div>
      <div id="puzzleDisplay">_ _ _</div>
      <div id="puzzleKeys"></div>
      <div id="puzzleMsg"></div>
      <div id="puzzleClose">[ FECHAR ]</div>
    </div>
  </div>

  <!-- ENDING SCREENS -->
  <div id="endingScreen" id="endingBad">
    <h2 id="endingTitle"></h2>
    <p id="endingText"></p>
    <canvas id="endingCanvas" style="width:320px;height:180px;margin-bottom:20px;border:1px solid #2a1a1a;background:#000;"></canvas>
    <button class="ending-btn" id="endingBtn">VOLTAR</button>
  </div>

  <div id="deathScreen" style="display:none;">
    <h2>SHIVA TE PEGOU!</h2>
    <p id="deathText">VOCÊ PERDEU TODOS OS ITENS DO DIA.<br/>TENTE NOVAMENTE...</p>
    <button class="ending-btn" id="retryBtn" style="border-color:#8a0303;color:#8a0303;" onmouseover="this.style.background='#8a0303';this.style.color='#000'" onmouseout="this.style.background='none';this.style.color='#8a0303'">TENTAR NOVAMENTE</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="doghouse.js"></script>
</body>
</html>
