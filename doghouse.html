<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>// CASA DE CACHORRO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Press Start 2P', monospace; color: #fff; }
    canvas { display: block; }

    #gameUI {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }

    #crosshair {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px; color: rgba(255,255,255,0.3);
      pointer-events: none;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }

    #hud {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 20px; align-items: center;
      font-size: 7px; color: var(--text, #ccc);
      background: rgba(0,0,0,0.7); border: 1px solid rgba(168,85,247,0.3);
      padding: 10px 18px;
      pointer-events: none;
    }
    #hud span { color: var(--cyan, #0fc); }
    #hud .hud-day { color: var(--pink, #f27); }
    #hud .hud-pulse { animation: pulse 1s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #deathScreen {
      position: fixed; inset: 0; z-index: 100;
      background: #000; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 30px;
    }
    #deathScreen.open { display: flex; }
    #deathScreen h2 {
      font-size: 14px; color: #f22;
      text-shadow: 0 0 20px rgba(255,0,0,0.5);
      letter-spacing: 4px;
    }
    #deathScreen p {
      font-size: 8px; color: #888;
      max-width: 400px; text-align: center; line-height: 2;
    }
    #deathScreen .btn-retry {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px; padding: 12px 24px;
      background: none; border: 2px solid #f27;
      color: #f27; cursor: pointer;
      transition: all 0.15s;
      pointer-events: all;
    }
    #deathScreen .btn-retry:hover {
      background: #f27; color: #000;
    }

    #winScreen {
      position: fixed; inset: 0; z-index: 100;
      background: #000; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 20px;
    }
    #winScreen.open { display: flex; }

    #interactPrompt {
      position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
      font-size: 6px; color: var(--yellow, #ff0);
      background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,0,0.3);
      padding: 6px 12px;
      display: none;
      pointer-events: none;
      text-align: center; line-height: 1.8;
    }

    .loading-screen {
      position: fixed; inset: 0; z-index: 200;
      background: #0a0a0f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
    }
    .loading-screen.hidden {
      opacity: 0; pointer-events: none;
      transition: opacity 0.5s;
    }
    .loading-screen h1 {
      font-size: 10px; color: var(--purple, #a855f7);
      letter-spacing: 2px;
    }
    .loading-screen p {
      font-size: 6px; color: #666;
    }
    .loading-bar-wrap {
      width: 200px; height: 6px;
      border: 1px solid #333; background: #111;
    }
    .loading-bar-fill {
      height: 100%; width: 0%;
      background: var(--purple, #a855f7);
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen">
    <h1>// CASA DE CACHORRO</h1>
    <div class="loading-bar-wrap"><div class="loading-bar-fill" id="loadBar"></div></div>
    <p>CARREGANDO...</p>
  </div>

  <div id="gameUI">
    <div id="crosshair">+</div>
    <div id="hud">
      <span class="hud-day" id="hudDay">DIA 1</span>
      <span id="hudItems">ITENS: 0</span>
      <span id="hudMemories">MEMÓRIAS: 0/5</span>
      <span id="hudHunger">⏳</span>
    </div>
    <div id="interactPrompt"></div>
  </div>

  <div id="deathScreen">
    <h2>SHIVA TE PEGOU!</h2>
    <p id="deathText">VOCÊ PERDEU TODOS OS ITENS DO DIA.<br/>TENTE NOVAMENTE...</p>
    <button class="btn-retry" id="retryBtn">TENTAR NOVAMENTE</button>
  </div>

  <div id="winScreen">
    <h2 id="winTitle" style="font-size:12px;color:#0fc;"></h2>
    <p id="winText" style="font-size:7px;color:#888;max-width:400px;text-align:center;line-height:2;"></p>
    <button class="btn-retry" id="winBtn" style="border-color:#0fc;color:#0fc;">VOLTAR</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="doghouse.js"></script>
</body>
</html>
