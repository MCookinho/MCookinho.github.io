<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>O Passeio</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0505;
  color:#aaa878;
  font-family:'Press Start 2P',monospace;
  overflow:hidden;
  width:100vw; height:100vh;
  cursor:default;
  image-rendering:pixelated;
  -webkit-font-smoothing:none;
  -moz-osx-font-smoothing:unset;
}
#game-canvas {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  background:#0a0505;
}
/* scanlines */
#scanlines {
  position:fixed; top:0; left:0; width:100vw; height:100vh;
  pointer-events:none; z-index:100;
  background:repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px
  );
}
/* vignette */
#vignette {
  position:fixed; top:0; left:0; width:100vw; height:100vh;
  pointer-events:none; z-index:99;
  background:radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
}
/* overlay preto para transicoes */
#fade-overlay {
  position:fixed; top:0; left:0; width:100vw; height:100vh;
  background:#0a0505; z-index:200;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.5s;
}
#fade-overlay.active { opacity:1; }
/* hud */
#hud {
  position:fixed; top:0; left:0; width:100vw; height:100vh;
  pointer-events:none; z-index:50;
  font-size:10px; line-height:1.6;
  color:#aaa878;
  text-shadow:0 0 4px #0a0505;
}
#hud-day { position:absolute; top:16px; left:16px; }
#hud-memories { position:absolute; top:16px; left:50%; transform:translateX(-50%); display:flex; gap:6px; }
#hud-memories span { display:inline-block; width:10px; height:10px; border:2px solid #5a5a3a; border-radius:50%; background:transparent; }
#hud-memories span.filled { background:#aaa878; border-color:#aaa878; }
#hud-shiva { position:absolute; bottom:16px; left:16px; max-width:200px; font-size:8px; }
#hud-shiva.watching { color:#8a3a3a; animation:hudPulse 1s infinite; }
@keyframes hudPulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
#hud-inventory { position:absolute; bottom:16px; left:50%; transform:translateX(-50%); display:flex; gap:4px; }
#hud-inventory .slot {
  width:28px; height:28px; border:2px solid #3a1a1a; background:#1a0a0a;
  display:flex; align-items:center; justify-content:center;
  font-size:8px; color:#5a5a3a;
}
#hud-inventory .slot.filled { border-color:#a87850; color:#aaa878; }
#hud-lantern { position:absolute; bottom:16px; right:16px; font-size:8px; text-align:right; }
#hud-lantern .battery { display:inline-block; width:40px; height:6px; border:1px solid #3a1a1a; background:#1a0a0a; margin-top:4px; }
#hud-lantern .battery span { display:block; height:100%; background:#a85a3a; transition:width 0.3s; }
#hud-interact {
  position:absolute; bottom:50%; left:50%; transform:translate(-50%,0);
  font-size:12px; color:#aaa878;
  opacity:0; transition:opacity 0.2s;
  text-shadow:0 0 8px #0a0505;
}
#hud-interact.show { opacity:1; }
/* dialogo overlay */
#dialogue-overlay {
  position:fixed; bottom:0; left:0; width:100vw; height:30vh;
  background:rgba(10,5,5,0.92);
  z-index:150; display:none;
  pointer-events:auto;
  border-top:2px solid #3a1a1a;
  padding:24px 32px;
  font-size:10px; line-height:2;
  color:#aaa878;
}
#dialogue-overlay .speaker { color:#a87850; margin-bottom:8px; }
#dialogue-overlay .text { min-height:60px; }
#dialogue-overlay .continue { color:#5a5a3a; margin-top:12px; animation:hudPulse 1s infinite; }
/* note overlay */
#note-overlay {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  width:420px; max-width:80vw;
  background:#8a7a5a; border:3px solid #5a2a2a;
  z-index:180; display:none;
  padding:32px; pointer-events:auto;
  font-size:9px; line-height:1.8;
  color:#2a1010;
}
#note-overlay .note-title { color:#5a2a2a; margin-bottom:16px; font-size:8px; text-transform:uppercase; }
#note-overlay .note-text { margin-bottom:16px; }
#note-overlay .note-continue { color:#3a1a1a; animation:hudPulse 1s infinite; }
/* puzzle overlay */
#puzzle-overlay {
  position:fixed; top:0; left:0; width:100vw; height:100vh;
  background:rgba(10,5,5,0.85);
  z-index:170; display:none;
  pointer-events:auto;
}
#puzzle-overlay .puzzle-container {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  text-align:center;
}
#puzzle-overlay .puzzle-title { color:#a87850; font-size:12px; margin-bottom:24px; }
#puzzle-overlay .puzzle-hint { color:#5a5a3a; font-size:8px; margin-top:16px; }
/* final overlay */
#final-overlay {
  position:fixed; top:0; left:0; width:100vw; height:100vh;
  background:#0a0505;
  z-index:250; display:none;
  padding:10vh 15vw;
  font-size:12px; line-height:2;
  color:#aaa878;
  text-align:center;
  pointer-events:auto;
}
#final-overlay .final-title { color:#a87850; font-size:14px; margin-bottom:24px; }
#final-overlay .final-text { min-height:200px; }
#final-overlay .final-continue { color:#5a5a3a; margin-top:24px; animation:hudPulse 1s infinite; }
/* loading */
#loading {
  position:fixed; top:0; left:0; width:100vw; height:100vh;
  background:#0a0505; z-index:300;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:24px;
}
#loading .title { color:#a87850; font-size:16px; }
#loading .sub { color:#5a5a3a; font-size:8px; animation:hudPulse 1s infinite; }
#loading.hidden { display:none; }
/* intro cutscene */
#intro-overlay {
  position:fixed; top:0; left:0; width:100vw; height:100vh;
  background:#0a0505; z-index:160; display:none;
  padding:10vh 15vw;
  font-size:12px; line-height:2;
  color:#aaa878;
  text-align:center;
  pointer-events:auto;
}
.small-font { font-size:8px; }
#hud-journal-btn {
  position:fixed; bottom:16px; right:16px; z-index:55;
  font-size:16px; cursor:pointer; pointer-events:auto;
  filter:drop-shadow(0 0 4px #0a0505);
  transition:transform 0.2s;
}
#hud-journal-btn:hover { transform:scale(1.2); }
#journal-overlay {
  position:fixed; top:0; left:0; width:100vw; height:100vh;
  background:rgba(10,5,5,0.92); z-index:180; display:none;
  pointer-events:auto;
}
#journal-container {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:480px; max-width:85vw; max-height:75vh;
  background:#1a0a0a; border:2px solid #3a1a1a; padding:24px;
  overflow-y:auto;
}
#journal-header { color:#a87850; font-size:14px; margin-bottom:16px; text-align:center; }
#journal-tabs { display:flex; gap:16px; justify-content:center; margin-bottom:16px; }
.journal-tab { color:#5a5a3a; font-size:8px; cursor:pointer; padding:4px 12px; border:1px solid #3a1a1a; }
.journal-tab.active { color:#aaa878; border-color:#a87850; }
#journal-content { color:#aaa878; font-size:8px; line-height:2; min-height:100px; max-height:50vh; overflow-y:auto; }
#journal-content .entry { margin-bottom:16px; padding:8px; border:1px solid #2a1010; }
#journal-content .entry-title { color:#a87850; font-size:9px; margin-bottom:4px; }
#journal-content .entry-text { color:#8a7a5a; font-size:7px; line-height:1.8; white-space:pre-wrap; }
#journal-close { color:#5a5a3a; font-size:8px; text-align:center; margin-top:16px; cursor:pointer; }
#journal-close:hover { color:#aaa878; }
</style>
</head>
<body>

<div id="loading">
  <div class="title">O PASSEIO</div>
  <div class="sub">CARREGANDO...</div>
</div>

<canvas id="game-canvas"></canvas>

<div id="scanlines"></div>
<div id="vignette"></div>
<div id="fade-overlay"></div>

<div id="hud" style="display:none;">
  <div id="hud-day">DIA 1</div>
  <div id="hud-memories"></div>
  <div id="hud-shiva"></div>
  <div id="hud-inventory"></div>
  <div id="hud-lantern">
    LANTERNA: OFF<br>
    <div class="battery"><span style="width:0%"></span></div>
  </div>
  <div id="hud-interact">[E]</div>
  <div id="hud-journal-btn" title="DIÁRIO">📖</div>
</div>

<div id="dialogue-overlay">
  <div class="speaker"></div>
  <div class="text"></div>
  <div class="continue">[ENTER]</div>
</div>

<div id="note-overlay">
  <div class="note-title"></div>
  <div class="note-text"></div>
  <div class="note-continue">[ENTER]</div>
</div>

<div id="puzzle-overlay">
  <div class="puzzle-container">
    <div class="puzzle-title"></div>
    <div id="puzzle-content"></div>
    <div class="puzzle-hint"></div>
  </div>
</div>

<div id="final-overlay">
  <div class="final-title"></div>
  <div class="final-text"></div>
  <div class="final-continue">[ENTER]</div>
</div>

<div id="intro-overlay"></div>

<div id="journal-overlay">
  <div id="journal-container">
    <div id="journal-header">DIÁRIO</div>
    <div id="journal-tabs">
      <span class="journal-tab active" data-tab="notes">BILHETES</span>
      <span class="journal-tab" data-tab="memories">MEMÓRIAS</span>
    </div>
    <div id="journal-content"></div>
    <div id="journal-close">[FECHAR]</div>
  </div>
</div>

<script src="engine.js"></script>
<script src="sprites.js"></script>
<script src="map.js"></script>
<script src="story.js"></script>
<script src="puzzles.js"></script>
<script src="game.js"></script>
</body>
</html>
