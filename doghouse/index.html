<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Passeio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0505;color:#e8d4a8;font-family:Georgia,'Palatino','Times New Roman',serif;
  overflow:hidden;height:100vh;width:100vw;
  cursor:default;user-select:none;
}
#game-wrapper{position:absolute;top:0;left:0;width:100vw;height:100vh;overflow:hidden}
#game-canvas{display:block;width:100%;height:100%;image-rendering:auto;cursor:pointer}
#scanlines{
  pointer-events:none;position:absolute;top:0;left:0;width:100%;height:100%;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px);
  z-index:10;
}
#vignette{
  pointer-events:none;position:absolute;top:0;left:0;width:100%;height:100%;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(10,5,5,0.8) 100%);
  z-index:9;
}
#hud{
  position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;
}
#tooltip{
  position:absolute;bottom:48px;left:50%;transform:translateX(-50%);
  font-size:13px;color:#c4a46c;opacity:0;transition:opacity 0.3s;
  text-align:center;max-width:500px;pointer-events:none;z-index:6;
  text-shadow:0 0 10px rgba(10,5,5,0.9);
}
#tooltip.show{opacity:1}
#hud-memories{
  position:absolute;top:8px;left:8px;display:flex;gap:4px;z-index:6;
}
#hud-memories .mem-slot{
  width:16px;height:16px;border:1px solid #2a1010;display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#2a1010;background:rgba(10,5,5,0.8);
}
#hud-memories .mem-slot.filled{color:#c4a46c;border-color:#5a2a2a;background:rgba(20,10,10,0.9)}
#hud-watching{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:18px;color:#8a3a3a;opacity:0;transition:opacity 0.4s;z-index:6;
  text-shadow:0 0 30px rgba(138,58,58,0.3);letter-spacing:4px;
  pointer-events:none;
}
#hud-watching.show{opacity:1}
#inventory-bar{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  display:flex;gap:3px;z-index:6;pointer-events:auto;
}
#inventory-bar .slot{
  width:30px;height:30px;border:1px solid #2a1010;background:rgba(10,5,5,0.85);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:15px;color:#5a3a3a;transition:all 0.2s;position:relative;
}
#inventory-bar .slot:hover{border-color:#5a2a2a;background:rgba(20,10,10,0.95)}
#inventory-bar .slot.selected{border-color:#c4a46c;box-shadow:0 0 6px rgba(196,164,108,0.2)}
#inventory-bar .slot .slot-key{
  position:absolute;top:-8px;right:-4px;font-size:8px;color:#3a1a1a;
}
#hint-btn{
  position:absolute;bottom:8px;right:8px;z-index:6;pointer-events:auto;
  width:24px;height:24px;border-radius:50%;border:1px solid #2a1010;
  background:rgba(10,5,5,0.8);color:#3a1a1a;font-size:12px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:Georgia,serif;
}
#hint-btn:hover{border-color:#5a2a2a;color:#8a3a3a}
.note-overlay{
  display:none;position:absolute;top:0;left:0;width:100%;height:100%;
  z-index:20;align-items:center;justify-content:center;
  background:rgba(10,5,5,0.92);
}
.note-overlay .note-bg{
  background:#1a0a0a;border:1px solid #3a1a1a;padding:30px;max-width:420px;
  position:relative;
}
.note-overlay .note-symbol{font-size:36px;color:#5a3a5a;text-align:center;margin-bottom:12px}
.note-overlay .note-text{color:#c4a46c;font-size:13px;line-height:1.6;text-align:center;font-style:italic}
.note-overlay .note-close{
  margin-top:16px;text-align:center;color:#3a1a1a;cursor:pointer;font-size:11px;
}
.note-overlay .note-close:hover{color:#8a3a3a}
#intro-overlay{
  display:none;position:absolute;top:0;left:0;width:100%;height:100%;
  z-index:30;align-items:center;justify-content:center;
  background:#0a0505;flex-direction:column;padding:60px;
}
#intro-overlay .intro-text{font-size:17px;line-height:2;color:#e8d4a8;max-width:550px;text-align:center}
#intro-overlay .intro-sub{color:#3a1a1a;margin-top:24px;font-size:12px;cursor:pointer}
#intro-overlay .intro-sub:hover{color:#8a3a3a}
#final-overlay{
  display:none;position:absolute;top:0;left:0;width:100%;height:100%;
  z-index:30;align-items:center;justify-content:center;
  background:#0a0505;flex-direction:column;padding:60px;
}
#final-overlay .final-title{font-size:22px;color:#8a3a3a;margin-bottom:20px}
#final-overlay .final-text{font-size:15px;line-height:1.8;color:#e8d4a8;max-width:550px;text-align:center}
#final-overlay .final-sub{color:#3a1a1a;margin-top:24px;font-size:12px;cursor:pointer}
#final-overlay .final-sub:hover{color:#8a3a3a}
#transition-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:#0a0505;z-index:25;pointer-events:none;opacity:0;
  transition:opacity 0.4s;
}
#transition-overlay.active{opacity:1}
</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="game-canvas" width="800" height="600"></canvas>
  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div id="hud">
    <div id="hud-memories"></div>
    <div id="hud-watching">VOCÊ ESTÁ SENDO OBSERVADO</div>
    <div id="tooltip"></div>
    <div id="inventory-bar"></div>
    <div id="hint-btn">?</div>
  </div>
  <div id="intro-overlay">
    <div class="intro-text"></div>
    <div class="intro-sub">[ CLIQUE OU TECLE ENTER PARA CONTINUAR ]</div>
  </div>
  <div class="note-overlay" id="note-overlay">
    <div class="note-bg">
      <div class="note-symbol"></div>
      <div class="note-text"></div>
      <div class="note-close">[ FECHAR — ESC ]</div>
    </div>
  </div>
  <div id="final-overlay">
    <div class="final-title"></div>
    <div class="final-text"></div>
    <div class="final-sub">[ REINICIAR ]</div>
  </div>
  <div id="transition-overlay"></div>
</div>
<script src="audio.js"></script>
<script src="puzzles.js"></script>
<script src="art.js"></script>
<script src="story.js"></script>
<script src="engine.js"></script>
<script src="game.js"></script>
</body>
</html>
