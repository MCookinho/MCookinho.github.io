<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Passeio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
@keyframes flicker{0%,100%{opacity:1}50%{opacity:0.96}25%,75%{opacity:0.99}}
body{
  background:#0a0806;color:#3a2a1a;font-family:'Crimson Text',Georgia,'Palatino','Times New Roman',serif;
  overflow:hidden;height:100vh;width:100vw;cursor:default;user-select:none;
}
#game-wrapper{
  position:absolute;top:0;left:0;width:100vw;height:100vh;overflow:hidden;
  background:#0a0806;display:flex;align-items:center;justify-content:center;
}
#game-aspect{
  position:relative;width:100%;max-width:100vw;max-height:100vh;
  aspect-ratio:800/600;overflow:hidden;
}
#game-aspect > *{
  position:absolute;top:0;left:0;width:100%;height:100%;
}
#game-canvas{display:block;cursor:pointer}
#scanlines{
  pointer-events:none;z-index:10;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 3px);
}
#vignette-overlay{
  pointer-events:none;z-index:9;
  background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,0.85) 100%);
}
#tooltip{
  position:absolute;bottom:52px;left:50%;transform:translateX(-50%);
  font-size:13px;color:#5a4a3a;opacity:0;transition:opacity 0.3s;
  text-align:center;max-width:500px;pointer-events:none;z-index:6;
  text-shadow:0 0 10px rgba(0,0,0,0.9);
}
#tooltip.show{opacity:1}
#dir-hint{
  position:absolute;top:5%;left:50%;transform:translateX(-50%);
  font-size:16px;color:#3a2a1a;z-index:4;pointer-events:none;
  font-family:'Crimson Text',Georgia,serif;letter-spacing:4px;
  text-shadow:0 0 15px rgba(0,0,0,0.9);
}
#hud-watching{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:14px;color:#5a2a1a;opacity:0;transition:opacity 0.8s;z-index:6;
  text-shadow:0 0 40px rgba(90,42,26,0.3),0 0 80px rgba(90,42,26,0.1);letter-spacing:6px;
  pointer-events:none;font-weight:600;
}
#hud-watching.show{opacity:1}
#inventory-bar{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);top:auto;height:fit-content;
  display:flex;gap:2px;z-index:6;pointer-events:none;
  padding:4px 6px;border:1px solid #1a120c;background:rgba(10,8,6,0.85);
  max-width:80vw;overflow-x:auto;white-space:nowrap;
}
#inventory-bar::-webkit-scrollbar{height:3px}
#inventory-bar::-webkit-scrollbar-thumb{background:#2a1a0e;border-radius:2px}
#inventory-bar .slot{
  width:32px;height:32px;min-width:32px;border:1px solid #1a120c;background:rgba(10,8,6,0.95);
  display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:auto;
  font-size:14px;color:#3a2a1a;transition:all 0.25s;position:relative;
}
#inventory-bar .slot:hover{border-color:#3a2a1a;background:rgba(20,14,8,0.95)}
#inventory-bar .slot.selected{border-color:#5a4a3a;background:rgba(26,18,12,0.95);box-shadow:inset 0 0 8px rgba(90,74,58,0.15)}
#puzzle-overlay{
  display:none;z-index:20;pointer-events:auto;cursor:pointer;
}
#note-overlay{
  display:none;z-index:20;align-items:center;justify-content:center;
  background:rgba(5,3,2,0.96);
}
#note-overlay .note-bg{
  background:#0a0806;min-width:300px;max-width:480px;
  border-left:2px solid #2a1a0e;padding:24px;margin:0 20px;
}
#note-overlay .note-symbol{font-size:28px;color:#3a2a1a;text-align:center;margin-bottom:10px}
#note-overlay .note-text{color:#5a4a3a;font-size:12px;line-height:1.7;text-align:center;font-style:italic;
  white-space:pre-line;max-height:400px;overflow-y:auto;}
#note-overlay .note-close{margin-top:14px;text-align:center;color:#2a1a0e;cursor:pointer;font-size:11px}
#note-overlay .note-close:hover{color:#5a4a3a}
#intro-overlay{
  display:none;z-index:30;align-items:center;justify-content:center;
  background:#0a0806;flex-direction:column;padding:60px;
}
#intro-overlay .intro-text{font-size:17px;line-height:2;color:#5a4a3a;max-width:550px;text-align:center}
#intro-overlay .intro-sub{color:#2a1a0e;margin-top:24px;font-size:12px;cursor:pointer}
#intro-overlay .intro-sub:hover{color:#5a4a3a}
#final-overlay{
  display:none;z-index:30;align-items:center;justify-content:center;
  background:#0a0806;flex-direction:column;padding:60px;
}
#final-overlay .final-title{font-size:22px;color:#5a2a1a;margin-bottom:20px}
#final-overlay .final-text{font-size:15px;line-height:1.8;color:#5a4a3a;max-width:550px;text-align:center}
#final-overlay .final-text p{white-space:pre-line}
#final-overlay .final-sub{color:#2a1a0e;margin-top:24px;font-size:12px;cursor:pointer}
#final-overlay .final-sub:hover{color:#5a4a3a}
#transition-overlay{
  background:#0a0806;z-index:25;pointer-events:none;opacity:0;
  transition:opacity 0.4s;
}
#transition-overlay.active{opacity:1}
#transition-overlay.flash{opacity:1;transition:opacity 0.1s}
</style>
</head>
<body>
<div id="game-wrapper">
  <div id="game-aspect">
    <canvas id="game-canvas" width="800" height="600"></canvas>
    <div id="scanlines"></div>
    <div id="vignette-overlay"></div>
    <div id="dir-hint" style="display:none"></div>
    <div id="hud-watching">VOCÊ ESTÁ SENDO OBSERVADO</div>
    <div id="tooltip"></div>
    <div id="inventory-bar"></div>
    <div id="puzzle-overlay"></div>
    <div id="intro-overlay">
      <div class="intro-text"></div>
      <div class="intro-sub">[ CLIQUE OU TECLE ENTER PARA CONTINUAR ]</div>
    </div>
    <div id="note-overlay">
      <div class="note-bg">
        <div class="note-symbol"></div>
        <div class="note-text"></div>
        <div class="note-close">[ FECHAR — ESC ]</div>
      </div>
    </div>
    <div id="final-overlay">
      <div class="final-title"></div>
      <div class="final-text"></div>
      <div class="final-sub">[ REINICIAR ]</div>
    </div>
    <div id="transition-overlay"></div>
  </div>
</div>
<script src="audio.js"></script>
<script src="art.js"></script>
<script src="story.js"></script>
<script src="puzzles.js"></script>
<script src="engine.js"></script>
<script src="game.js"></script>
</body>
</html>
