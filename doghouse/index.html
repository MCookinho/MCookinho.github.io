<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Passeio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.6}}
@keyframes flicker{0%,100%{opacity:1}50%{opacity:0.97}25%,75%{opacity:0.99}}
@keyframes breathe{0%,100%{text-shadow:0 0 10px rgba(42,31,20,0.8)}50%{text-shadow:0 0 20px rgba(42,31,20,0.5)}}
body{
  background:#2a1f14;color:#e8d4a8;font-family:'Crimson Text',Georgia,'Palatino','Times New Roman',serif;
  overflow:hidden;height:100vh;width:100vw;cursor:default;user-select:none;
}
#game-wrapper{
  position:absolute;top:0;left:0;width:100vw;height:100vh;overflow:hidden;
  box-shadow:inset 0 0 100px rgba(42,31,20,0.8);
}
#game-canvas{display:block;width:100%;height:100%;image-rendering:auto;cursor:pointer}
#scanlines{
  pointer-events:none;position:absolute;top:0;left:0;width:100%;height:100%;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(42,31,20,0.04) 2px,rgba(42,31,20,0.04) 3px);
  z-index:10;
}
#vignette{
  pointer-events:none;position:absolute;top:0;left:0;width:100%;height:100%;
  background:radial-gradient(ellipse at center,transparent 50%,rgba(42,31,20,0.7) 100%);
  z-index:9;
}
#hud{
  position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;
}
#tooltip{
  position:absolute;bottom:52px;left:50%;transform:translateX(-50%);
  font-size:13px;color:#8a7050;opacity:0;transition:opacity 0.3s;
  text-align:center;max-width:500px;pointer-events:none;z-index:6;
  text-shadow:0 0 10px rgba(42,31,20,0.9);
}
#tooltip.show{opacity:1}
#hud-memories{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:6;
  opacity:0.5;
}
#hud-memories .mem-slot{
  width:18px;height:18px;border:1px solid #4a3a2a;display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#4a3a2a;background:rgba(42,31,20,0.9);
}
#hud-memories .mem-slot.filled{color:#8a7050;border-color:#8a7050;background:rgba(58,42,26,0.95)}
#room-label{
  position:absolute;top:5%;left:50%;transform:translateX(-50%);
  font-size:20px;color:#3a2a1a;letter-spacing:8px;z-index:4;pointer-events:none;
  font-family:'Crimson Text',Georgia,serif;font-style:italic;
  text-shadow:0 0 15px rgba(42,31,20,0.8);
}
#dir-hint{
  position:absolute;top:10%;left:50%;transform:translateX(-50%);
  font-size:10px;color:#4a3a2a;z-index:4;pointer-events:none;
  font-family:'Crimson Text',Georgia,serif;
}
#hud-watching{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:14px;color:#8a4a2a;opacity:0;transition:opacity 0.8s;z-index:6;
  text-shadow:0 0 40px rgba(138,74,42,0.3),0 0 80px rgba(138,74,42,0.1);letter-spacing:6px;
  pointer-events:none;font-weight:600;
}
#hud-watching.show{opacity:1}
#inventory-bar{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  display:flex;gap:2px;z-index:6;pointer-events:auto;
  padding:4px 6px;border:1px solid #3a2a1a;background:rgba(42,31,20,0.85);
  max-width:80vw;overflow-x:auto;white-space:nowrap;
}
#inventory-bar::-webkit-scrollbar{height:3px}
#inventory-bar::-webkit-scrollbar-thumb{background:#4a3a2a;border-radius:2px}
#inventory-bar .slot{
  width:32px;height:32px;min-width:32px;border:1px solid #3a2a1a;background:rgba(42,31,20,0.9);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:14px;color:#5a4a30;transition:all 0.25s;position:relative;
}
#inventory-bar .slot:hover{border-color:#5a4a30;background:rgba(58,42,26,0.95)}
#inventory-bar .slot.selected{border-color:#8a7050;background:rgba(74,58,42,0.95);box-shadow:inset 0 0 8px rgba(138,112,80,0.15)}
#inventory-bar .slot.drag-over{border-color:#8a7050;background:rgba(74,58,42,0.9)}
#hint-btn{
  position:absolute;bottom:52px;right:12px;z-index:6;pointer-events:auto;
  width:24px;height:24px;border:1px solid #3a2a1a;
  background:rgba(42,31,20,0.8);color:#4a3a2a;font-size:11px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:'Crimson Text',Georgia,serif;
  opacity:0.5;transition:all 0.3s;
}
#hint-btn:hover{border-color:#5a4a30;color:#8a7050;opacity:1}
#puzzle-overlay{
  display:none;position:absolute;top:0;left:0;width:100%;height:100%;
  z-index:20;pointer-events:auto;cursor:pointer;
}
#note-overlay{
  display:none;position:absolute;top:0;left:0;width:100%;height:100%;
  z-index:20;align-items:center;justify-content:center;
  background:rgba(42,31,20,0.95);
}
#note-overlay .note-bg{
  background:#2a1f14;border:1px solid #4a3a2a;padding:30px;max-width:420px;
  position:relative;
}
#note-overlay .note-symbol{font-size:36px;color:#5a4a30;text-align:center;margin-bottom:12px}
#note-overlay .note-text{color:#8a7050;font-size:13px;line-height:1.6;text-align:center;font-style:italic}
#note-overlay .note-close{margin-top:16px;text-align:center;color:#4a3a2a;cursor:pointer;font-size:11px}
#note-overlay .note-close:hover{color:#8a7050}
#intro-overlay{
  display:none;position:absolute;top:0;left:0;width:100%;height:100%;
  z-index:30;align-items:center;justify-content:center;
  background:#2a1f14;flex-direction:column;padding:60px;
}
#intro-overlay .intro-text{font-size:17px;line-height:2;color:#8a7050;max-width:550px;text-align:center}
#intro-overlay .intro-sub{color:#4a3a2a;margin-top:24px;font-size:12px;cursor:pointer}
#intro-overlay .intro-sub:hover{color:#8a7050}
#final-overlay{
  display:none;position:absolute;top:0;left:0;width:100%;height:100%;
  z-index:30;align-items:center;justify-content:center;
  background:#2a1f14;flex-direction:column;padding:60px;
}
#final-overlay .final-title{font-size:22px;color:#8a4a2a;margin-bottom:20px}
#final-overlay .final-text{font-size:15px;line-height:1.8;color:#8a7050;max-width:550px;text-align:center}
#final-overlay .final-sub{color:#4a3a2a;margin-top:24px;font-size:12px;cursor:pointer}
#final-overlay .final-sub:hover{color:#8a7050}
#transition-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:#2a1f14;z-index:25;pointer-events:none;opacity:0;
  transition:opacity 0.4s;
}
#transition-overlay.active{opacity:1}
</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="game-canvas" width="800" height="600"></canvas>
  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div id="hud">
    <div id="hud-memories"></div>
    <div id="hud-watching">VOCÊ ESTÁ SENDO OBSERVADO</div>
    <div id="room-label"></div>
    <div id="tooltip"></div>
    <div id="dir-hint"></div>
    <div id="inventory-bar"></div>
    <div id="hint-btn">?</div>
  </div>
  <div id="puzzle-overlay"></div>
  <div id="intro-overlay">
    <div class="intro-text"></div>
    <div class="intro-sub">[ CLIQUE OU TECLE ENTER PARA CONTINUAR ]</div>
  </div>
  <div id="note-overlay">
    <div class="note-bg">
      <div class="note-symbol"></div>
      <div class="note-text"></div>
      <div class="note-close">[ FECHAR — ESC ]</div>
    </div>
  </div>
  <div id="final-overlay">
    <div class="final-title"></div>
    <div class="final-text"></div>
    <div class="final-sub">[ REINICIAR ]</div>
  </div>
  <div id="transition-overlay"></div>
</div>
<script src="audio.js"></script>
<script src="art.js"></script>
<script src="story.js"></script>
<script src="puzzles.js"></script>
<script src="engine.js"></script>
<script src="game.js"></script>
</body>
</html>
