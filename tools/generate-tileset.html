<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Doghouse - Gerar Tileset</title>
<style>
body { background:#1a1a1a; color:#ccc; font-family:sans-serif; padding:20px; }
canvas { image-rendering:pixelated; border:1px solid #444; display:block; margin:20px 0; }
button { padding:10px 20px; font-size:16px; cursor:pointer; background:#3a3a1a; color:#aaa878; border:1px solid #5a5a3a; }
button:hover { background:#5a5a3a; }
.info { margin:10px 0; }
</style>
</head>
<body>
<h1>Doghouse — Gerar Tileset para Tiled</h1>
<p>Gera a spritesheet com 72 tiles de cenario + 11 sprites de itens/objetos.</p>
<p>Salve o PNG para usar como tileset no Tiled (16×16, margem 0, espaçamento 0).</p>
<button id="generate">Gerar Tileset</button>
<button id="download" style="display:none">Download PNG</button>
<div class="info" id="info"></div>
<div id="canvas-container"></div>

<script src="../doghouse/sprites.js"></script>
<script>
const COLS = 10;
const TILE_SIZE = 16;
const ITEM_SPRITES = [I_LANTERN, I_KEY, I_HERBS, I_SALT, I_AMULET, I_CHALK, I_MIRROR, I_NOTE, I_MEMORY, I_PHOTO, I_LETTER];
const BASE_TILES = 72;
const TOTAL_TILES = BASE_TILES + ITEM_SPRITES.length; // 83 (1-72 cenario, 73-83 itens/objetos)
const ROWS = Math.ceil(TOTAL_TILES / COLS);

function getTile(id) {
  const v = T_SPRITES[id];
  if (!v) return null;
  // v is array-of-variants if v[0][0] is itself an array
  if (Array.isArray(v) && Array.isArray(v[0]) && Array.isArray(v[0][0])) {
    return v[0]; // first variant
  }
  return v;
}

function renderTile(ctx, sprite, ox, oy) {
  if (!sprite) return;
  for (let row = 0; row < sprite.length; row++) {
    for (let col = 0; col < sprite[row].length; col++) {
      const ci = sprite[row][col];
      if (ci === undefined || ci === null || ci === 0) continue;
      ctx.fillStyle = PALETTE_16[ci];
      ctx.fillRect(ox + col, oy + row, 1, 1);
    }
  }
}

function generate() {
  const canvas = document.createElement('canvas');
  canvas.width = COLS * TILE_SIZE;
  canvas.height = ROWS * TILE_SIZE;
  const ctx = canvas.getContext('2d');

  // checkered background for transparency display
  for (let y = 0; y < ROWS * TILE_SIZE; y += 8) {
    for (let x = 0; x < COLS * TILE_SIZE; x += 8) {
      ctx.fillStyle = ((Math.floor(x/8) + Math.floor(y/8)) % 2 === 0) ? '#ccc' : '#999';
      ctx.fillRect(x, y, 8, 8);
    }
  }

  // tiles 1-72 (cenario)
  for (let id = 1; id <= BASE_TILES; id++) {
    const col = (id - 1) % COLS;
    const row = Math.floor((id - 1) / COLS);
    const sprite = getTile(id);
    if (sprite) renderTile(ctx, sprite, col * TILE_SIZE, row * TILE_SIZE);
  }

  // tiles 73-83 (itens/objetos)
  for (let i = 0; i < ITEM_SPRITES.length; i++) {
    const id = BASE_TILES + 1 + i;
    const col = (id - 1) % COLS;
    const row = Math.floor((id - 1) / COLS);
    renderTile(ctx, ITEM_SPRITES[i], col * TILE_SIZE, row * TILE_SIZE);
  }

  const container = document.getElementById('canvas-container');
  container.innerHTML = '';
  container.appendChild(canvas);

  document.getElementById('info').textContent =
    `Tileset: ${TOTAL_TILES} tiles (1-72 cenario, 73-${TOTAL_TILES} itens) em ${COLS}×${ROWS} = ${canvas.width}×${canvas.height}px — sem tile vazio, Tiled GID = ID do tile`;

  const dl = document.getElementById('download');
  dl.style.display = 'inline';
  dl.onclick = () => {
    const link = document.createElement('a');
    link.download = 'doghouse-tileset.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  };
}

document.getElementById('generate').addEventListener('click', generate);
generate();
</script>
</body>
</html>
